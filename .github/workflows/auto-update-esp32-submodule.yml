name: Auto update submodules

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodules to latest main
        run: |
          git submodule update --init --remote esp32
          git submodule update --init --remote stm32_rtthread

      - name: Commit and push if pointer changed
        run: |
          if git diff --quiet -- esp32 stm32_rtthread; then
            echo "submodule pointers unchanged"
            exit 0
          fi

          git add esp32 stm32_rtthread
          git commit -m "chore(submodule): auto-update esp32 and stm32_rtthread"
          git push origin HEAD:main
